<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vetting Dashboard</title>
<style>
  :root{
    --bg:#f4f5f7; --surface:#ffffff; --text:#141821; --muted:#68707d;
    --border:#e5e8ec; --border-2:#d3d8df; --accent:#1d4ed8; --accent-soft:#eef3fe;
    --primary:#141821;
    --ok:#15803d; --ok-bg:#edf6ef; --ok-bd:#cfe6d5;
    --warn:#b45309; --warn-bg:#fdf3e6; --warn-bd:#eedcbe;
    --bad:#b91c1c; --bad-bg:#fbecea; --bad-bd:#f0cfcb;
    --shadow:0 1px 2px rgba(16,20,28,.05),0 6px 20px -12px rgba(16,20,28,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex:none;box-shadow:0 1px 3px rgba(16,20,28,.04)}
  .topbar h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-.2px}
  .topbar h1::before{content:"";display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent);margin-right:9px;vertical-align:1px}
  .topbar .sub{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .topbar .acts{display:flex;gap:8px}
  .topbar button{background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:7px;padding:7px 14px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
  .topbar button:hover{background:#f7f8fa;border-color:#bfc6d0}

  #demoBanner{display:none;background:var(--warn-bg);border-bottom:1px solid var(--warn-bd);color:#7a4d0a;padding:8px 22px;font-size:12.5px;font-weight:600;text-align:center;flex:none}

  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex:none}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:760px}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{border:1px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;background:var(--surface);transition:background .15s,border-color .15s,box-shadow .15s,transform .15s;text-align:left}
  .stat:hover{background:#f7f8fa;transform:translateY(-1px);box-shadow:var(--shadow)}
  .stat.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,78,216,.15)}
  .stat .n{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  .stat.review .n{color:var(--warn)} .stat.approve .n{color:var(--ok)} .stat.decline .n{color:var(--bad)}
  .toolbar{display:flex;gap:10px;margin-top:13px;max-width:760px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--border-2);border-radius:6px;font-size:14px;font-family:var(--font)}
  .toolbar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
  .toolbar select{padding:9px 12px;border:1px solid var(--border-2);border-radius:6px;font-size:13.5px;font-family:var(--font);background:var(--surface)}

  .layout{display:grid;grid-template-columns:340px 1fr;flex:1;min-height:0}
  @media(max-width:820px){.layout{grid-template-columns:1fr}.detail{display:none}.layout.showdetail .list{display:none}.layout.showdetail .detail{display:block}}
  .list{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto}
  .listhead{padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  .item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
  .item:hover{background:#f7f8fa}
  .item.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  .item .r1{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .item .nm{font-weight:600;font-size:14.5px}
  .item .when{font-size:11.5px;color:var(--muted);margin-top:2px}
  .empty-list{padding:24px 16px;color:var(--muted);font-size:13px}

  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .pill.approve{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
  .pill.review{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
  .pill.decline{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad-bd)}

  .detail{overflow-y:auto;padding:24px 26px}
  .empty{height:100%;display:grid;place-items:center;color:var(--muted);font-size:14px}
  .panel{max-width:820px;margin:0 auto}
  .back{display:none;background:none;border:none;color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;padding:0 0 12px}
  @media(max-width:820px){.back{display:inline-block}}
  .dhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .dhead h2{font-size:22px;font-weight:650;margin:0;letter-spacing:-.3px}
  .dhead .meta{font-size:13px;color:var(--muted);margin-top:3px}
  .chips{display:flex;gap:9px;flex-wrap:wrap}
  .chip{border:1px solid var(--border);border-radius:10px;padding:10px 15px;text-align:center;min-width:86px;background:var(--surface);box-shadow:var(--shadow)}
  .chip .n{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .chip .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:5px;font-weight:600}

  .sec{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:16px;box-shadow:var(--shadow)}
  .sec h3{margin:0 0 14px;font-size:11.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:700}
  .ai-lead{font-size:15px;line-height:1.55}

  .vbadges{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 4px}
  .vbadge{border:1px solid var(--border);border-radius:8px;padding:9px 12px;flex:1;min-width:150px}
  .vbadge .vt{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .vbadge .vv{font-size:13.5px;font-weight:650;margin-top:3px;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dot.g{background:var(--ok)} .dot.y{background:var(--warn)} .dot.r{background:var(--bad)} .dot.n{background:#9aa1ab}

  .idtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .idtable td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
  .idtable td.k{color:var(--muted);width:34%;font-weight:600}
  .mismatch-row{display:flex;gap:8px;padding:8px 11px;background:var(--bad-bg);border:1px solid var(--bad-bd);color:#8d2018;border-radius:6px;font-size:13px;margin-top:8px}

  .ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
  @media(max-width:600px){.ai-grid{grid-template-columns:1fr}}
  .ai-grid h4{margin:0 0 7px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .ai-grid ul{margin:0;padding-left:17px;font-size:13.5px;display:grid;gap:5px}
  .ai-grid .good h4{color:var(--ok)} .ai-grid .bad h4{color:var(--bad)}
  .notes{margin-top:14px;background:#f7f8fa;border:1px solid var(--border);border-radius:7px;padding:11px 13px;font-size:13px;color:#3a4250}
  .aierr{background:var(--warn-bg);border:1px solid var(--warn-bd);color:#7a4d0a;border-radius:7px;padding:11px 13px;font-size:13px}
  .credlist{list-style:none;margin:8px 0 0;padding:0;display:grid;gap:6px}
  .credlist li{display:flex;gap:8px;font-size:13px;padding:8px 11px;border-radius:6px;background:var(--bad-bg);border:1px solid var(--bad-bd);color:#8d2018}

  .brow{display:grid;grid-template-columns:150px 1fr 62px;align-items:center;gap:12px;margin-bottom:11px}
  @media(max-width:560px){.brow{grid-template-columns:1fr}}
  .brow .name{font-size:12.5px;font-weight:600}.brow .name small{display:block;color:var(--muted);font-weight:400;font-size:11px}
  .brow .bar{height:8px;background:#eceef1;border-radius:999px;overflow:hidden}
  .brow .bar i{display:block;height:100%;border-radius:999px;transition:width .4s ease}
  .brow .pts{text-align:right;font-weight:650;font-size:14px}

  .flaglist{list-style:none;margin:0;padding:0;display:grid;gap:7px}
  .flaglist li{display:flex;gap:9px;font-size:13px;padding:9px 11px;border-radius:6px;border:1px solid}
  .flaglist li.critical,.flaglist li.high{background:var(--bad-bg);border-color:var(--bad-bd);color:#8d2018}
  .flaglist li.medium{background:var(--warn-bg);border-color:var(--warn-bd);color:#7a4d0a}
  .flaglist li.good{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}

  table.kv{width:100%;border-collapse:collapse;font-size:13px}
  table.kv td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top}
  table.kv td.k{color:var(--muted);font-weight:600;width:38%}
  .docrow{display:flex;gap:12px;flex-wrap:wrap}
  .docrow figure{margin:0;text-align:center;font-size:11px;color:var(--muted)}
  .docrow img{max-height:130px;max-width:200px;border:1px solid var(--border);border-radius:7px;display:block;background:#f0f1f3}

  .login{position:fixed;inset:0;background:radial-gradient(900px 500px at 50% -10%,#2a3140,#15181f 70%);display:grid;place-items:center;z-index:50}
  .login .box{background:var(--surface);border-radius:14px;padding:34px 30px 30px;width:360px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .login .mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:15px;font-weight:700;margin-bottom:14px}
  .login h2{font-size:19px;font-weight:700;margin:0 0 4px;letter-spacing:-.2px}
  .login p{margin:0 0 18px;color:var(--muted);font-size:13px}
  .login input{width:100%;padding:12px 14px;border:1px solid var(--border-2);border-radius:8px;font-size:14.5px;margin-bottom:11px;font-family:var(--font);transition:border-color .15s,box-shadow .15s}
  .login input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,.13)}
  .login button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-family:var(--font);font-size:14.5px;font-weight:600;cursor:pointer;transition:background .15s}
  .login button:hover{background:#2a3140}
  .login .err{color:var(--bad);font-size:13px;margin-bottom:10px;display:none}
  .login .err.show{display:block}

  /* decisions + indicators */
  .item .warn{color:var(--bad);font-weight:700;margin-left:4px}
  .item .decided{color:var(--ok);font-weight:600}
  .item .veh{font-size:11.5px;color:var(--muted);margin-top:2px}
  .wants{font-size:14px;margin-top:8px;color:var(--text);background:#eef4ff;border:1px solid #d6e3fb;border-radius:7px;padding:8px 12px;display:inline-block}
  .toprow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
  .printbtn{background:var(--surface);border:1px solid var(--border-2);border-radius:7px;padding:7px 14px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
  .printbtn:hover{background:#f7f8fa;border-color:#bfc6d0}
  .decision .dbtns{display:flex;gap:8px;flex-wrap:wrap}
  .dbtn{border:1px solid var(--border-2);background:var(--surface);border-radius:8px;padding:9px 17px;font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text);transition:background .15s,border-color .15s}
  .dbtn:hover{background:#f7f8fa;border-color:#bfc6d0}
  .dbtn.active[data-dec=approve]{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
  .dbtn.active[data-dec=followup]{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
  .dbtn.active[data-dec=decline]{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad)}
  .decision textarea{width:100%;margin-top:11px;padding:10px 12px;border:1px solid var(--border-2);border-radius:7px;font-family:var(--font);font-size:13.5px;resize:vertical;min-height:58px;color:var(--text)}
  .decision textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
  .dsave{display:flex;align-items:center;gap:12px;margin-top:11px}
  .dsave button{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:9px 19px;font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:background .15s}
  .dsave button:hover{background:#2a3140}
  .dstatus{font-size:12.5px;color:var(--muted)}
  @media print{
    .topbar,#demoBanner,.controls,.list,.login,.back,.printbtn,.decision .dbtns,.dsave{display:none!important}
    body{display:block}.layout{display:block}.detail{overflow:visible;padding:0}.panel{max-width:100%}
    .sec{break-inside:avoid;border-color:#ccc}
  }
</style>
</head>
<body>

<div class="login" id="login">
  <div class="box">
    <div class="mark">RV</div>
    <h2>Vetting Dashboard</h2>
    <p>Enter the staff password to view applications.</p>
    <div class="err" id="loginErr">Incorrect password.</div>
    <input type="password" id="pw" placeholder="Staff password" autocomplete="current-password" />
    <button id="loginBtn">Unlock</button>
  </div>
</div>

<div class="topbar">
  <div><h1>Renter Vetting</h1><div class="sub" id="count">—</div></div>
  <div class="acts"><button id="refresh">Refresh</button><button id="logout">Lock</button></div>
</div>
<div id="demoBanner">● Demo mode — sample applications (no live backend). Deploy to Vercel to receive real submissions.</div>

<div class="controls">
  <div class="stats">
    <button class="stat" data-filter="all"><div class="n" id="s-all">0</div><div class="l">Total</div></button>
    <button class="stat review" data-filter="review"><div class="n" id="s-review">0</div><div class="l">Needs review</div></button>
    <button class="stat approve" data-filter="approve"><div class="n" id="s-approve">0</div><div class="l">Approve</div></button>
    <button class="stat decline" data-filter="decline"><div class="n" id="s-decline">0</div><div class="l">Decline</div></button>
  </div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search by name or email…" />
    <select id="sort">
      <option value="new">Sort: Newest</option>
      <option value="risk">Sort: Highest risk</option>
      <option value="name">Sort: Name (A–Z)</option>
    </select>
  </div>
</div>

<div class="layout" id="layout">
  <div class="list"><div class="listhead"><span>Applications</span><span id="listcount"></span></div><div id="items"></div></div>
  <div class="detail"><div class="empty" id="empty">Select an application to view details.</div><div class="panel" id="panel" style="display:none"></div></div>
</div>

<script src="demo-engine.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let KEY = sessionStorage.getItem("vetkey") || "";
let DATA = [];
let activeId = null;
let filter = "all", search = "", sortKey = "new";

const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmtDate = (s) => { try { return new Date(s).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }); } catch (e) { return s; } };
const verdict = (r) => (r.recommendation || (r.scores && r.scores.verdict) || "review").toLowerCase();
const DLABEL = { approve: "approved", decline: "declined", followup: "follow-up" };
let selectedDecision = "";
function getDemoDecisions() { try { return JSON.parse(localStorage.getItem("vetting_decisions") || "{}"); } catch (e) { return {}; } }
function setDemoDecision(id, staff) { const m = getDemoDecisions(); m[id] = staff; try { localStorage.setItem("vetting_decisions", JSON.stringify(m)); } catch (e) {} }
function effectiveStaff(r) { return (r && r.staff) || getDemoDecisions()[r.id] || null; }
// The status shown in the list/stats reflects YOUR decision once made, else the AI/rule recommendation.
function decisionStatus(r) { const st = effectiveStaff(r); if (st && st.decision) return st.decision === "followup" ? "review" : st.decision; return verdict(r); }
function timeAgo(s) { const d = new Date(s); if (isNaN(d)) return s; const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return "just now"; if (diff < 3600) return Math.floor(diff / 60) + "m ago"; if (diff < 86400) return Math.floor(diff / 3600) + "h ago"; if (diff < 604800) return Math.floor(diff / 86400) + "d ago"; return d.toLocaleDateString(); }
async function saveDecision(id, decision, note) {
  // After any save, re-render the open panel directly (the mid-edit guard in
  // refreshAll would otherwise treat the just-saved note as an unsaved draft).
  const rerender = () => { const row = DATA.find((r) => r.id === id); if (row && activeId === id) renderDetail(row); refreshAll(); };
  const local = () => { const staff = { decision, note, decided_at: new Date().toISOString() }; setDemoDecision(id, staff); rerender(); };
  const saveFailed = (msg) => { const ds = $("decStatus"); if (ds) ds.textContent = "Could not save: " + msg; };
  let res;
  try { res = await fetch("/api/decision", { method: "POST", headers: { "Content-Type": "application/json", "x-dashboard-key": KEY }, body: JSON.stringify({ id, decision, note }) }); }
  catch (e) { return IS_LOCAL ? local() : saveFailed("connection problem — try again."); }
  if (!res.ok) {
    let j = null; try { j = await res.json(); } catch (e) {}
    if (j && j.error) return saveFailed(cleanErr(j.error));
    return IS_LOCAL ? local() : saveFailed("server error " + res.status + " — try again.");
  }
  const j = await res.json(); const row = DATA.find((r) => r.id === id); if (row) row.staff = j.staff;
  rerender();
}

function setLoginError(msg) { const el = $("loginErr"); el.textContent = msg; el.classList.add("show"); $("login").style.display = "grid"; }
// Strip any HTML out of server errors (a paused database returns a full error page)
// and translate the common "database asleep" case into plain English.
function cleanErr(m) {
  const t = String(m == null ? "" : m).replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
  if (/web server is down|error code 521|waking|unreachable/i.test(t)) return "The database is waking up — wait about a minute, then try again.";
  return t.slice(0, 160);
}
function enterDemo() {
  if (!window.DEMO || KEY !== window.DEMO.PW) return setLoginError("Incorrect password.");
  DATA = [...window.DEMO.getLocal(), ...window.DEMO.samples];
  $("demoBanner").style.display = "block";
  $("login").style.display = "none";
  refreshAll();
}
// --- live updates: poll for new submissions while the tab is open ---
const POLL_MS = 15000;
// Demo mode (sample data) is only for opening the file locally — a deployed
// dashboard must never silently swap real applications for samples.
const IS_LOCAL = location.protocol === "file:" || /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
let pollTimer = null;
let loadingNow = false;   // overlap guard: never let two loads race
let liveLoaded = false;   // true once real data has been shown
function startPolling() { if (!pollTimer) pollTimer = setInterval(() => { if (KEY && document.visibilityState === "visible") load(true); }, POLL_MS); }
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
// True while the operator is mid-edit on the open application (typed note or
// picked a decision since it was rendered) — a refresh must not wipe that work.
let renderedBaseline = null; // { note, decision } as last rendered into the panel
function detailBusy() {
  if (!renderedBaseline) return false;
  const note = $("decNote");
  if (note && note.value !== renderedBaseline.note) return true;
  if (selectedDecision !== renderedBaseline.decision) return true;
  const panel = $("panel");
  return !!(panel && document.activeElement && panel.contains(document.activeElement));
}
// Fingerprint of what the detail pane shows — photo_urls are excluded because
// every poll re-signs them; re-rendering on that alone re-downloads all photos.
let lastDetailKey = null;
function detailKey(r) { return JSON.stringify([r.id, effectiveStaff(r), r.rule_total, r.ai_score, r.recommendation]); }
async function load(silent) {
  if (loadingNow) return;
  loadingNow = true;
  try {
    let res;
    try { res = await fetch("/api/submissions", { headers: { "x-dashboard-key": KEY } }); }
    catch (e) {
      if (silent || liveLoaded) return; // keep current data; next poll retries
      if (IS_LOCAL) return enterDemo();
      return setLoginError("Can't reach the server — check your connection and try again.");
    }
    if (res.status === 401) { stopPolling(); return setLoginError("Incorrect password."); }
    if (!res.ok) {
      if (silent || liveLoaded) return; // transient server hiccup — keep showing current data
      let j = null; try { j = await res.json(); } catch (e) {}
      if (j && j.error) return setLoginError("Server error " + res.status + " — " + cleanErr(j.error));
      if (IS_LOCAL) return enterDemo();
      return setLoginError("Server error " + res.status + " — try again in a minute.");
    }
    const j = await res.json();
    DATA = j.submissions || [];
    liveLoaded = true;
    $("login").style.display = "none";
    $("demoBanner").style.display = "none";
    startPolling();
    refreshAll();
  } finally { loadingNow = false; }
}

function refreshAll() {
  // stat counts from full data
  const c = { all: DATA.length, review: 0, approve: 0, decline: 0 };
  DATA.forEach((r) => { const v = decisionStatus(r); if (c[v] != null) c[v]++; });
  $("s-all").textContent = c.all; $("s-review").textContent = c.review; $("s-approve").textContent = c.approve; $("s-decline").textContent = c.decline;
  $("count").textContent = DATA.length + " total" + (pollTimer ? " · live" : "");
  document.querySelectorAll(".stat").forEach((s) => s.classList.toggle("active", s.getAttribute("data-filter") === filter));
  renderList();
  if (activeId) {
    const row = DATA.find((r) => r.id === activeId);
    // Re-render the open application only when its content actually changed and
    // the operator isn't mid-edit — avoids photo flicker and draft-note wipes.
    if (row && detailKey(row) !== lastDetailKey && !detailBusy()) renderDetail(row);
  }
}

function visibleRows() {
  let rows = DATA.slice();
  if (filter !== "all") rows = rows.filter((r) => decisionStatus(r) === filter);
  if (search) { const q = search.toLowerCase(); rows = rows.filter((r) => (r.applicant_name || "").toLowerCase().includes(q) || (r.email || "").toLowerCase().includes(q)); }
  if (sortKey === "name") rows.sort((a, b) => (a.applicant_name || "").localeCompare(b.applicant_name || ""));
  else if (sortKey === "risk") rows.sort((a, b) => (b.ai_score ?? b.rule_total ?? 0) - (a.ai_score ?? a.rule_total ?? 0));
  else rows.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  return rows;
}
function renderList() {
  const rows = visibleRows();
  $("listcount").textContent = rows.length;
  $("items").innerHTML = rows.map((r) => {
    const v = decisionStatus(r); const ai = r.ai || {};
    const flagged = (ai.identity_check && ai.identity_check.verdict === "mismatch") || (ai.document_authenticity && ["suspicious", "likely_fake"].includes(ai.document_authenticity.verdict));
    const st = effectiveStaff(r);
    const veh = (r.data && r.data.vehicle) || "";
    return `<div class="item${r.id === activeId ? " active" : ""}" data-id="${r.id}">
      <div class="r1"><span class="nm">${esc(r.applicant_name || "Unknown")}${flagged ? '<span class="warn" title="ID mismatch or suspicious document">⚠</span>' : ""}</span><span class="pill ${v}">${v}</span></div>
      <div class="when">${esc(timeAgo(r.created_at))} · rule ${r.rule_total ?? "—"}${r.ai_score != null ? " · AI " + r.ai_score : ""}${st ? ' · <span class="decided">✓ ' + esc(DLABEL[st.decision] || st.decision || "") + "</span>" : ""}</div>
      ${veh ? `<div class="veh">${esc(veh)}</div>` : ""}
    </div>`;
  }).join("") || `<div class="empty-list">No applications match.</div>`;
  document.querySelectorAll(".item").forEach((el) => el.addEventListener("click", () => {
    activeId = el.getAttribute("data-id");
    document.querySelectorAll(".item").forEach((x) => x.classList.toggle("active", x === el));
    const row = DATA.find((r) => r.id === activeId); if (row) renderDetail(row);
    $("layout").classList.add("showdetail");
  }));
}

const VTEXT = {
  identity: { match: ["g", "Matches ID"], partial_match: ["y", "Partial match"], mismatch: ["r", "Mismatch"], unreadable: ["n", "Unreadable"] },
  doc: { appears_genuine: ["g", "Appears genuine"], suspicious: ["y", "Suspicious"], likely_fake: ["r", "Likely fake"], cannot_determine: ["n", "Can't determine"] },
  ins: { document_reviewed: ["g", "Card reviewed"], self_reported_only: ["y", "Self-reported"], possibly_expired: ["y", "Possibly expired"], name_mismatch: ["r", "Name mismatch"], unreadable: ["n", "Unreadable"], no_document: ["n", "No document"] },
};
function vbadge(title, map, key) {
  const e = map[key] || ["n", key || "—"];
  return `<div class="vbadge"><div class="vt">${title}</div><div class="vv"><span class="dot ${e[0]}"></span>${esc(e[1])}</div></div>`;
}

function renderDetail(r) {
  $("empty").style.display = "none";
  const p = $("panel"); p.style.display = "block";
  const d = r.data || {}, s = r.scores || {}, ai = r.ai || {}, urls = r.photo_urls || {};
  const v = verdict(r);
  const ic = ai.identity_check || {}, da = ai.document_authenticity || {}, inc = ai.insurance_check || {};
  const ex = ic.extracted || {};

  const cats = [{ key: "mvr", name: "Driving (MVR)" }, { key: "fraud", name: "Fraud" }, { key: "insurance", name: "Insurance" }, { key: "rental", name: "Rental History" }];
  const catHtml = cats.map((c) => {
    const cat = (s.categories && s.categories[c.key]) || { points: 0, cap: 0, lines: [] };
    const pct = cat.cap ? Math.round((cat.points / cat.cap) * 100) : 0;
    const color = pct >= 50 ? "var(--bad)" : pct >= 25 ? "var(--warn)" : "var(--ok)";
    return `<div class="brow"><div class="name">${c.name}<small>${esc((cat.lines || []).join(" · "))}</small></div><div class="bar"><i style="width:${pct}%;background:${color}"></i></div><div class="pts">${cat.points}/${cat.cap}</div></div>`;
  }).join("");

  const order = { critical: 0, high: 1, medium: 2, good: 3 };
  const flags = (s.flags || []).slice().sort((a, b) => order[a.level] - order[b.level]);
  const icon = { critical: "⛔", high: "⚠", medium: "!", good: "✓" };
  const flagHtml = flags.length ? flags.map((f) => `<li class="${f.level}"><span>${icon[f.level] || "•"}</span> ${esc(f.text)}</li>`).join("") : `<li class="good"><span>✓</span> No rule flags.</li>`;

  // AI verification section
  let aiBlock;
  if (ai && !ai.error) {
    const mism = (ic.mismatches || []);
    const idTable = `<table class="idtable">
      <tr><td class="k">Name on ID</td><td>${esc(ex.full_name || "—")}</td></tr>
      <tr><td class="k">DOB on ID</td><td>${esc(ex.date_of_birth || "—")}</td></tr>
      <tr><td class="k">License #</td><td>${esc(ex.license_number || "—")}</td></tr>
      <tr><td class="k">Expires</td><td>${esc(ex.expiration_date || "—")}</td></tr>
      <tr><td class="k">Address on ID</td><td>${esc(ex.address || "—")}</td></tr>
    </table>` + mism.map((m) => `<div class="mismatch-row"><span>⚠</span> ${esc(m)}</div>`).join("");
    const credHtml = (ai.credibility_flags || []).length ? `<ul class="credlist">${ai.credibility_flags.map((x) => `<li><span>⚠</span> ${esc(x)}</li>`).join("")}</ul>` : `<div style="font-size:13px;color:var(--muted);margin-top:6px">No misrepresentation signals detected.</div>`;
    aiBlock = `<div class="ai-lead">${esc(ai.summary || "")}</div>
      <div class="vbadges">
        ${vbadge("Identity vs ID", VTEXT.identity, ic.verdict)}
        ${vbadge("Document (fake-ID screen)", VTEXT.doc, da.verdict)}
        ${vbadge("Insurance", VTEXT.ins, inc.status)}
      </div>
      <div class="ai-grid">
        <div class="good"><h4>Strengths</h4><ul>${(ai.strengths || []).map((x) => `<li>${esc(x)}</li>`).join("") || "<li>—</li>"}</ul></div>
        <div class="bad"><h4>Concerns</h4><ul>${(ai.concerns || []).map((x) => `<li>${esc(x)}</li>`).join("") || "<li>—</li>"}</ul></div>
      </div>`;
    aiBlock += `<h3 style="margin-top:18px">Identity read off the license</h3>${idTable}`;
    aiBlock += `<h3 style="margin-top:18px">Document authenticity</h3>${(da.flags || []).length ? `<ul class="flaglist">${da.flags.map((f) => `<li class="${da.verdict === "appears_genuine" ? "good" : da.verdict === "likely_fake" ? "high" : "medium"}"><span>•</span> ${esc(f)}</li>`).join("")}</ul>` : "<div style='font-size:13px;color:var(--muted)'>No flags.</div>"}`;
    aiBlock += `<h3 style="margin-top:18px">Insurance review</h3><div style="font-size:13.5px">${esc(inc.notes || "—")}</div>`;
    aiBlock += `<h3 style="margin-top:18px">Possible misrepresentation</h3>${credHtml}`;
    if (ai.document_notes) aiBlock += `<div class="notes">${esc(ai.document_notes)}</div>`;
  } else {
    aiBlock = `<div class="aierr">AI assessment unavailable${ai && ai.error ? ": " + esc(ai.error) : ""}.</div>`;
  }

  const photos = ["front", "back", "selfie", "insurance"].map((k) => urls[k]
    ? `<figure><img src="${urls[k]}" alt="${k}" /><figcaption>${k === "front" ? "License — Front" : k === "back" ? "License — Back" : k === "selfie" ? "Selfie" : "Insurance"}</figcaption></figure>` : "").join("");

  const kv = [
    ["Vehicle requested", esc(d.vehicle || "—")],
    ["Rental dates", d.pickupDate ? `${esc(d.pickupDate)}${d.returnDate ? " → " + esc(d.returnDate) : ""}` : "—"],
    ["Date of birth", `${esc(d.dob)}${d.age != null ? " (" + d.age + " yrs)" : ""}`],
    ["Phone", esc(d.phone)], ["Email", esc(d.email)],
    ["Address", `${esc(d.address)} (${d.yearsAddr} yr)`],
    ["License", [d.licClass && esc(d.licClass), esc(d.licStatus), "exp " + esc(d.licExp)].filter(Boolean).join(" · ")],
    ["Driving", `${d.violations} violations · ${d.accidents} at-fault · ${d.dui} DUI${d.priorSusp ? " · prior suspension" : ""}${d.reckless ? " · reckless" : ""}`],
    ["Insurance", d.hasIns === "yes" ? `${esc(d.insProvider || "—")} ••${esc(d.insPolicy || "----")}${d.insExp ? " · exp " + esc(d.insExp) : ""}` : "No personal policy"],
    ["Rental history", d.rentedBefore === "yes" ? "Has rented before" : "First-time renter"],
  ].map(([k, val]) => `<tr><td class="k">${k}</td><td>${val}</td></tr>`).join("");

  // Third-party verification results (Vouched ID check / Plaid bank link) —
  // only present on submissions where the renter used those steps.
  let verifSec = "";
  const vf = r.verification || {};
  if (vf.vouched || vf.plaid) {
    let inner = "";
    if (vf.vouched) {
      const vo = vf.vouched;
      if (vo.error) {
        inner += `<div class="aierr">Vouched ID check — ${esc(vo.error)}</div>`;
      } else {
        const conf = vo.confidences || {};
        const confRows = Object.keys(conf).map((k) => `<tr><td class="k">${esc(k)}</td><td>${Math.round((conf[k] || 0) * 100)}%</td></tr>`).join("");
        // "Verified" = the check succeeded AND the name on the ID matches this
        // applicant — a bare job id could be replayed from someone else's check.
        const ok = vo.verified === true;
        const label = ok ? "Verified" : vo.success && vo.nameMatch === false ? "ID passed — name mismatch" : "Not verified";
        inner += `<div class="vbadges">
          <div class="vbadge"><div class="vt">Vouched — ID verification</div><div class="vv"><span class="dot ${ok ? "g" : "r"}"></span>${esc(label)}${vo.status ? " · " + esc(vo.status) : ""}</div></div>
          <div class="vbadge"><div class="vt">Name on ID</div><div class="vv">${esc([vo.firstName, vo.lastName].filter(Boolean).join(" ") || "—")}</div></div>
          <div class="vbadge"><div class="vt">DOB on ID</div><div class="vv">${esc(vo.birthDate || "—")}</div></div>
        </div>`;
        if (vo.nameMatch === false) inner += `<div class="mismatch-row"><span>⚠</span> The name on the verified ID does not match this applicant — possible replayed/borrowed verification.</div>`;
        if (confRows) inner += `<table class="idtable">${confRows}</table>`;
        if (Array.isArray(vo.issues) && vo.issues.length) inner += vo.issues.map((x) => `<div class="mismatch-row"><span>⚠</span> ${esc(typeof x === "string" ? x : x.message || JSON.stringify(x))}</div>`).join("");
      }
    }
    if (vf.plaid) {
      const pl = vf.plaid;
      if (pl.error) {
        inner += `<div class="aierr" style="margin-top:10px">Plaid bank link — ${esc(pl.error)}</div>`;
      } else {
        const accts = (pl.accounts || []).map((a) => `${a.name || a.subtype || "account"} ••${a.mask || "----"}`).join(" · ");
        inner += `<div class="vbadges" style="margin-top:10px">
          <div class="vbadge"><div class="vt">Plaid — bank verification</div><div class="vv"><span class="dot g"></span>Connected${pl.institution ? " · " + esc(pl.institution) : ""}</div></div>
          <div class="vbadge"><div class="vt">Account holder matches applicant</div><div class="vv"><span class="dot ${pl.nameMatch ? "g" : "r"}"></span>${pl.nameMatch ? "Match" : "No match"}</div></div>
        </div>
        <div style="font-size:13px;margin-top:6px"><span style="color:var(--muted)">Holders:</span> ${esc((pl.ownerNames || []).join(", ") || "—")}${accts ? ` <span style="color:var(--muted)">· Accounts:</span> ${esc(accts)}` : ""}</div>`;
      }
    }
    verifSec = `<div class="sec"><h3>Third-party verifications</h3>${inner}</div>`;
  }

  const st0 = effectiveStaff(r) || {};
  const cur0 = st0.decision || "";
  const decisionSec = `<div class="sec decision"><h3>Your decision</h3>` +
    `<div class="dbtns">` +
    `<button class="dbtn${cur0 === "approve" ? " active" : ""}" data-dec="approve">Approve</button>` +
    `<button class="dbtn${cur0 === "followup" ? " active" : ""}" data-dec="followup">Follow-up</button>` +
    `<button class="dbtn${cur0 === "decline" ? " active" : ""}" data-dec="decline">Decline</button></div>` +
    `<textarea id="decNote" placeholder="Internal notes (optional)…">${esc(st0.note || "")}</textarea>` +
    `<div class="dsave"><button id="saveDec">Save decision</button><span class="dstatus" id="decStatus">${st0.decided_at ? "Last saved " + esc(timeAgo(st0.decided_at)) : ""}</span></div></div>`;
  p.innerHTML = `
    <div class="toprow"><button class="back" id="backBtn">← All applications</button><button class="printbtn" id="printBtn">Print / Save PDF</button></div>
    <div class="dhead">
      <div><h2>${esc(r.applicant_name || "Unknown")}</h2><div class="meta">Submitted ${esc(fmtDate(r.created_at))} · ${esc(r.email || "")}</div>${d.vehicle ? `<div class="wants">Wants: <strong>${esc(d.vehicle)}</strong>${d.pickupDate ? " · " + esc(d.pickupDate) + (d.returnDate ? " → " + esc(d.returnDate) : "") : ""}</div>` : ""}</div>
      <div class="chips">
        <div class="chip"><div class="n">${r.rule_total ?? "—"}</div><div class="l">Rule</div></div>
        <div class="chip"><div class="n">${r.ai_score ?? "—"}</div><div class="l">AI risk</div></div>
        <div class="chip"><div class="n" style="font-size:14px;padding-top:5px"><span class="pill ${v}">${v}</span></div><div class="l">Recommend</div></div>
      </div>
    </div>
    ${decisionSec}
    ${verifSec}
    <div class="sec"><h3>AI Assessment${ai && ai.confidence ? ` · ${esc(ai.confidence)} confidence` : ""}</h3>${aiBlock}</div>
    <div class="sec"><h3>Category points</h3>${catHtml}</div>
    <div class="sec"><h3>Rule flags</h3><ul class="flaglist">${flagHtml}</ul></div>
    <div class="sec"><h3>Uploaded documents</h3><div class="docrow">${photos || "<span style='color:var(--muted);font-size:13px'>No photos on file.</span>"}</div></div>
    <div class="sec"><h3>Submitted details</h3><table class="kv">${kv}</table></div>`;
  selectedDecision = cur0;
  renderedBaseline = { note: st0.note || "", decision: cur0 };
  lastDetailKey = detailKey(r);
  p.querySelectorAll(".dbtn").forEach((b) => b.addEventListener("click", () => { selectedDecision = b.getAttribute("data-dec"); p.querySelectorAll(".dbtn").forEach((x) => x.classList.toggle("active", x === b)); }));
  const sd = $("saveDec"); if (sd) sd.addEventListener("click", () => saveDecision(r.id, selectedDecision, $("decNote") ? $("decNote").value : ""));
  const pb = $("printBtn"); if (pb) pb.addEventListener("click", () => window.print());
  const bb = $("backBtn"); if (bb) bb.addEventListener("click", () => $("layout").classList.remove("showdetail"));
}

function logout() { stopPolling(); sessionStorage.removeItem("vetkey"); KEY = ""; $("login").style.display = "grid"; $("pw").value = ""; $("pw").focus(); }
$("loginBtn").addEventListener("click", () => { KEY = $("pw").value.trim(); sessionStorage.setItem("vetkey", KEY); $("loginErr").classList.remove("show"); load(); });
$("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") $("loginBtn").click(); });
$("refresh").addEventListener("click", () => load());
$("logout").addEventListener("click", logout);
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible" && KEY && pollTimer) load(true); });
document.querySelectorAll(".stat").forEach((s) => s.addEventListener("click", () => { filter = s.getAttribute("data-filter"); refreshAll(); }));
$("search").addEventListener("input", (e) => { search = e.target.value.trim(); renderList(); });
$("sort").addEventListener("change", (e) => { sortKey = e.target.value; renderList(); });
if (KEY) load(); else $("pw").focus();
</script>
</body>
</html>
